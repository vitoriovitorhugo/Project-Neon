<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Jump — Remastered</title>
    <meta name="description" content="A rhythm-based action platformer. Guide your cube through neon obstacles synced to the beat!">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='4' width='24' height='24' rx='4' fill='%230a0a2e' stroke='%2300ffcc' stroke-width='3'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Orbitron',sans-serif;cursor:default;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
        canvas{display:block;width:100%;height:100%}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script src="js/levels.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/render.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
